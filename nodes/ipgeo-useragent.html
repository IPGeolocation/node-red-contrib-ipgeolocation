<!-- ============================================================
     ipgeo-useragent.html
     User-Agent parser node
     ============================================================ -->

<script type="text/javascript">
(function () {
  'use strict';

  RED.nodes.registerType('ipgeo-useragent', {
    category:    'IPGeolocation',
    color:       '#5da0d0',
    icon:        'font-awesome/fa-desktop',
    paletteLabel:'ipgeo user-agent',

    defaults: {
      name:       { value: '' },
      server:     { value: '', type: 'ipgeo-config', required: true },
      uaType:     { value: 'msg' },
      uaValue:    { value: 'req.headers.user-agent' },
      outputProp: { value: 'payload' },
      outputType: { value: 'msg' },
      twoOutputs: { value: true },
    },

    inputs:  1,
    outputs: 2,
    outputLabels: function (idx) { return idx === 0 ? 'success' : 'error'; },

    label: function () { return this.name || 'ipgeo user-agent'; },

    oneditprepare: function () {
      const node = this;

      $('#node-input-uaValue').typedInput({
        default:   'msg',
        typeField: '#node-input-uaType',
        types:     ['msg', 'flow', 'global', 'str'],
      });

      $('#node-input-outputProp').typedInput({
        default:   'msg',
        typeField: '#node-input-outputType',
        types:     ['msg', 'flow', 'global'],
      });

      $('#node-input-twoOutputs').prop('checked', node.twoOutputs !== false);
    },

    oneditsave: function () {
      this.twoOutputs = $('#node-input-twoOutputs').prop('checked');
    },
  });
}());
</script>

<!-- ── Edit template ── -->
<script type="text/html" data-template-name="ipgeo-useragent">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i>&nbsp;Name</label>
    <input type="text" id="node-input-name" placeholder="ipgeo user-agent" style="width:70%"/>
  </div>
  <div class="form-row">
    <label for="node-input-server"><i class="fa fa-key"></i>&nbsp;API Config</label>
    <input type="text" id="node-input-server" style="width:70%"/>
  </div>
  <hr/>
  <div class="form-row">
    <label for="node-input-uaValue"><i class="fa fa-desktop"></i>&nbsp;User-Agent</label>
    <input type="text" id="node-input-uaValue" style="width:70%"/>
    <input type="hidden" id="node-input-uaType"/>
    <div style="margin-top:4px;font-size:0.82em;color:#888;">
      Point to the message property that holds the UA string, or enter a
      static string directly. Default: <code>msg.req.headers.user-agent</code>
      (works with the built-in HTTP In node).
    </div>
  </div>
  <hr/>
  <div class="form-row">
    <label for="node-input-outputProp"><i class="fa fa-sign-out"></i>&nbsp;Output to</label>
    <input type="text" id="node-input-outputProp" style="width:70%"/>
    <input type="hidden" id="node-input-outputType"/>
  </div>
  <div class="form-row">
    <label><i class="fa fa-random"></i>&nbsp;Outputs</label>
    <input type="checkbox" id="node-input-twoOutputs" style="width:auto;margin-right:6px"/>
    <label for="node-input-twoOutputs" style="display:inline;font-weight:normal">
      Use second output for errors
    </label>
  </div>
</script>

<!-- ── Help panel ── -->
<script type="text/html" data-help-name="ipgeo-useragent">
  <p>
    Parses a User-Agent string using the
    <strong>IPGeolocation.io User-Agent API</strong> to identify the browser,
    device type, OS, and rendering engine.
  </p>

  <h3>Input</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">any</span></dt>
    <dd>Passed through. The User-Agent string is read from a separate property.</dd>
  </dl>

  <h3>Output</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">object</span></dt>
    <dd>
      <code>{ user_agent_string, name, type, version, version_major,
      device: { name, type, brand, cpu },
      engine: { name, type, version },
      operating_system: { name, type, version, build } }</code>
    </dd>
  </dl>

  <h3>Tip</h3>
  <p>
    Connect to Node-RED's built-in <strong>HTTP In</strong> node and set the
    UA source to <code>msg.req.headers.user-agent</code> to automatically
    parse visitor browser details.
  </p>

  <h3>References</h3>
  <ul>
    <li>
      <a href="https://ipgeolocation.io/documentation/user-agent-api.html" target="_blank">
        User-Agent API documentation
      </a>
    </li>
  </ul>
</script>
